name: Java CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile All Java Files
      run: |
        # Tüm kaynak ve test dosyalarını tek seferde derliyoruz
        find . -name "*.java" > sources.txt
        javac @sources.txt

    - name: Run Scheduler Unit Tests
      run: |
        # Derlenen test sınıfını classpath belirterek koşturuyoruz
        java -cp . src/test/java/SchedulerTest.java
